# Docker Compose v2 declaration for the SK_P dev environment.
# Phase 2 (INFRA-06, INFRA-07) — postgres + healthcheck + named volume + depends_on skeleton.
# The baseapi-service block has its `build:` line COMMENTED OUT until Phase 8 lands the Dockerfile (INFRA-05).

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  otel-collector:
    # Phase 5 (CONTEXT.md D-10) — receives OTLP from BaseApi.Service, writes JSON-lines
    # to ./tests/.otel-out/ (host bind-mount; tests/.otel-out/ is gitignored). Contrib
    # image required for the `file` exporter that Plan 05-02 verification reads.
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: sk-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    # Override the default non-root user (UID 10001) so the file exporter can write to the
    # Windows + Docker Desktop bind-mount target ./tests/.otel-out — on Windows the host
    # directory permissions don't map cleanly to UID 10001 inside the container, and the
    # file exporter SILENTLY drops writes when it cannot create /var/otel-out/telemetry.jsonl.
    # Surfaced during Plan 05-02 Task 3 (LogExportTests first run). Acceptable for dev-only
    # observability scaffolding (compose.yaml is local-only — Phase 8 production stack will
    # ship a separate image with a dedicated otel user matching the host).
    user: "0:0"
    volumes:
      - ./compose/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - ./tests/.otel-out:/var/otel-out
    ports:
      - "4317:4317"   # OTLP gRPC (default exporter target)
      - "4318:4318"   # OTLP HTTP (optional — curl-from-laptop debugging)
      - "13133:13133" # health_check extension (probed from host — distroless image has no wget/curl/sh)
    # NOTE (fix-forward of Plan 05-01 deviation, Rule 1 — distroless image has no wget):
    # The contrib 0.95.0 image is distroless (no /bin/sh, no wget, no curl). The original
    # Plan 05-01 healthcheck `["CMD", "wget", ...]` cannot execute — exec fails with
    # "wget: executable file not found in $PATH". The CMD form runs without a shell, so
    # there is no portable HTTP probe inside the image. Resolutions:
    #   (a) drop the container-level healthcheck entirely and rely on (i) port 13133
    #       exposed to the host, which the test fixture can curl from outside, plus
    #       (ii) the otelcol-contrib binary's own startup which exits non-zero on bad
    #       config (so a misconfigured container would not stay Up at all).
    # We use (a). Plan 05-02 Wave-0 verifies the collector is reachable from the host
    # via `curl http://localhost:13133/` instead of the in-container healthcheck.

  baseapi-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

volumes:
  pgdata:
