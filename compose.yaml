# Docker Compose v2 declaration for the SK_P dev environment.
# Phase 2 (INFRA-06, INFRA-07) — postgres + healthcheck + named volume + depends_on skeleton.
# The baseapi-service block has its `build:` line COMMENTED OUT until Phase 8 lands the Dockerfile (INFRA-05).

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  otel-collector:
    # Phase 5 (CONTEXT.md D-10) — receives OTLP from BaseApi.Service, writes JSON-lines
    # to ./tests/.otel-out/ (host bind-mount; tests/.otel-out/ is gitignored). Contrib
    # image required for the `file` exporter that Plan 05-02 verification reads.
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: sk-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./compose/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - ./tests/.otel-out:/var/otel-out
    ports:
      - "4317:4317"   # OTLP gRPC (default exporter target)
      - "4318:4318"   # OTLP HTTP (optional — curl-from-laptop debugging)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 5s
      timeout: 3s
      retries: 5

  baseapi-service:
    # Phase 8 (INFRA-05) will set this to: build: { context: ., dockerfile: src/BaseApi.Service/Dockerfile }
    # Until then, this placeholder image lets Compose v2.20+/v5.x resolve the service block (which now
    # requires every declared service to have either `image:` or `build:` — even for `docker compose config`).
    # The placeholder tag is non-existent on any registry, so `docker compose up baseapi-service` still
    # fails loudly (image-pull failure) — preserving D-08's negative-assertion intent. Also gated behind
    # the `phase-8` profile so default `up`/`down` operations skip the service entirely.
    image: baseapi-service:phase-8-placeholder
    profiles: ["phase-8"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
