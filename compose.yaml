# Docker Compose v2 declaration for the SK_P dev environment.
# Phase 2 (INFRA-06, INFRA-07) — postgres + healthcheck + named volume + depends_on skeleton.
# The baseapi-service block has its `build:` line COMMENTED OUT until Phase 8 lands the Dockerfile (INFRA-05).

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Phase 11 D-10 + D-12 — verbatim sk2_1 dev posture: single-node, no auth, no TLS, no volume,
  # 512m heap, port 9200:9200 only (9300 cluster transport intentionally not exposed).
  # container_name reuses sk2_1's `sk-elasticsearch` literal — sk_p + sk2_1 stacks are
  # mutually exclusive on a single Docker daemon (RESEARCH Pitfall 4).
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    container_name: sk-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      # Single-quote the URL so the shell does not parse `&` as a background operator
      # (would silently background curl and skip `|| exit 1`, making the healthcheck always green).
      # wait_for_status=yellow — single-node ES never reaches green (replicas can never be assigned).
      # RESEARCH Pitfall 6 — start_period: 60s essential; ES 8.x cold-start ~30s on warm dev machine,
      # default start_period: 0s exhausts the retries budget before ES is ready.
      test: ["CMD-SHELL", "curl -fs 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  otel-collector:
    # Phase 11 D-09 — bumped 0.95.0 -> 0.152.0 (gives us the native elasticsearch + prometheus
    # exporters with current `mapping.mode` semantics; 0.95.0 predates `mapping.mode` field).
    # Receives OTLP from BaseApi.Service (gRPC :4317 / HTTP :4318), exposes Prom-scrape
    # endpoint on :8889 (Phase 11 D-14), exposes health_check extension on :13133 (carried
    # forward — host-side `curl localhost:13133/` smoke probe; distroless image still has
    # no in-container probe per RESEARCH Pitfall 3).
    image: otel/opentelemetry-collector-contrib:0.152.0
    container_name: sk-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./compose/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (default exporter target)
      - "4318:4318"   # OTLP HTTP (optional — curl-from-laptop debugging)
      - "8889:8889"   # Phase 11 D-14 — Prom scrape endpoint exposed to host
      - "13133:13133" # health_check extension (probed from host — distroless image has no wget/curl/sh)
    # NOTE (Phase 5 Plan 05-01 deviation + Phase 11 0.152.0 verification) — distroless image still has no wget):
    # The contrib 0.152.0 image is distroless (no /bin/sh, no wget, no curl). The original
    # Plan 05-01 healthcheck `["CMD", "wget", ...]` cannot execute — exec fails with
    # "wget: executable file not found in $PATH". The CMD form runs without a shell, so
    # there is no portable HTTP probe inside the image. Resolutions:
    #   (a) drop the container-level healthcheck entirely and rely on (i) port 13133
    #       exposed to the host, which the test fixture can curl from outside, plus
    #       (ii) the otelcol-contrib binary's own startup which exits non-zero on bad
    #       config (so a misconfigured container would not stay Up at all).
    # We use (a). Plan 05-02 Wave-0 verifies the collector is reachable from the host
    # via `curl http://localhost:13133/` instead of the in-container healthcheck.

  # Phase 11 D-11 + D-13 — verbatim sk2_1 dev posture. Scrapes otel-collector:8889 every 15s
  # (configured in prometheus.yml at repo root; bind-mounted read-only). No persistence volume
  # (ephemeral dev), no remote_write, no alerting/recording rules (deferred Out of Scope).
  # container_name reuses sk2_1's `sk-prometheus` literal — mutually exclusive with sibling
  # sk2_1 stack on a single Docker daemon (RESEARCH Pitfall 4).
  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: sk-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      # --web.enable-lifecycle exposes POST /-/reload for runtime config reload (dev convenience).
      - "--web.enable-lifecycle"
    volumes:
      # prometheus.yml lives at the sk_p repo root (NEW file in Plan 11-04).
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # Prometheus HTTP API — host-side `/api/v1/query` reachable from tests.
    depends_on:
      otel-collector:
        # service_started is sufficient: otel-collector 0.152.0 starts listening on :8889
        # immediately; service_healthy would require a healthcheck on the distroless image
        # (currently absent per RESEARCH Pitfall 3).
        condition: service_started
    healthcheck:
      # /-/healthy is the Prometheus liveness endpoint (200 == process running + config loaded).
      # IN-07 review fix: align flag set with baseapi-service healthcheck below
      # (`wget --spider -q`). prom/prometheus is a minimal image without curl; wget is
      # available in both images and idiomatically equivalent across services.
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Phase 12 D-02 — sk-redis container_name mirrors sk-elasticsearch (Phase 11 D-10)
  # and sk-prometheus (Phase 11 D-13) for mutual exclusion with sk2_1 on a single
  # Docker daemon. The sk-* prefix is the cross-stack uniqueness convention.
  #
  # Phase 12 D-01 — host port 6380:6379 mirrors Phase 2 D-01 Postgres 5433:5432
  # collision-avoidance. Defends against a developer's local Redis on the default
  # 6379 AND defines the HealthDeadRedisFixture dead-port (the unbound host 6379)
  # for TEST-REDIS-05 zero-allocation dead-Redis acceptance facts.
  #
  # Phase 12 D-03 — persistence intentionally disabled. L2 is rebuildable from L3
  # (Postgres) on demand; RDB snapshots + AOF are dead weight and slow boot. The
  # absence of a volumes entry + the explicit --save "" --appendonly no command
  # encode this intent so a future operator does NOT re-enable persistence as a
  # "fix" for some other problem.
  #
  # INFRA-REDIS-01 — Redis 7.4.x-alpine pinned deliberately to the 7.4 line
  # (RSALv2/SSPLv1 dual-license, NOT 8.0+ AGPLv3 tri-license). 7.4.x's licensing
  # is restrictive but does not have the network-distribution copyleft clause that
  # would force legal review.
  redis:
    image: redis:7.4.9-alpine
    container_name: sk-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      # INFRA-REDIS-02 — redis-cli ping with exit code 0 on PONG, non-zero on
      # connection failure. The alpine image ships redis-cli in /usr/local/bin.
      # CMD form (NOT CMD-SHELL) avoids Alpine BusyBox sh quoting hazards
      # (RESEARCH Pitfall 5). Cadence 5s/3s/10/5s is INFRA-REDIS-02 locked.
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Phase 19 D-09 (INFRA-RMQ-02) — RabbitMQ broker tier. sk-rabbitmq container_name mirrors
  # the sk-* cross-stack uniqueness convention (sk-redis line 137, sk-elasticsearch line 30).
  # Host ports 5673:5672 (AMQP) + 15673:15672 (management UI) mirror redis 6380:6379
  # collision-avoidance (Phase 12 D-01) — avoids a developer's local broker on default 5672/15672.
  # Dev creds guest/guest (T-19-broker-creds: accepted dev-only posture; k8s/prod override via
  # secrets, never committed). CMD-form healthcheck matches the redis idiom (line 147, no shell).
  # start_period: 40s + retries: 5 accommodate broker cold-start before service_healthy gates
  # dependents (T-19-broker-cold-start mitigation).
  rabbitmq:
    image: rabbitmq:4.1.8-management-alpine
    container_name: sk-rabbitmq
    restart: unless-stopped
    ports:
      - "5673:5672"    # AMQP (host 5673 — collision-avoidance, mirrors redis 6380)
      - "15673:15672"  # management UI (host 15673)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Phase 19 D-09 (INFRA-RMQ-02) — first runnable Orchestrator container. Builds from the new
  # multi-stage net8.0 Dockerfile (aspnet:8.0 runtime — BaseConsole.Core's embedded Kestrel health
  # listener needs the ASP.NET shared framework). Its /health/ready is HARD-on-broker (Phase 18
  # BusReadyHealthCheck — the INVERSE of baseapi-service's soft posture), so it goes healthy only
  # after the bus starts; depends_on rabbitmq + redis service_healthy gate that. Compose-DNS host
  # `rabbitmq` (NOT the host-side 5673 port) + ConnectionStrings__Redis copied verbatim from
  # baseapi-service (line 163) to keep the Redis connection shape identical.
  orchestrator:
    build:
      context: .
      dockerfile: src/Orchestrator/Dockerfile
    container_name: sk-orchestrator
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      ConnectionStrings__Redis: "redis:6379,abortConnect=false,connectTimeout=5000"
      Orchestrator__InstanceId: orchestrator-1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  baseapi-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      # Phase 12 D-04 — defensive override mirrors ConnectionStrings__Postgres convention.
      # Docker-internal hostname redis resolves via compose service DNS.
      ConnectionStrings__Redis: "redis:6379,abortConnect=false,connectTimeout=5000"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      # Phase 19 D-09 (INFRA-RMQ-02/03) — Start/Stop path RabbitMq config. Compose-DNS host
      # `rabbitmq` (NOT the host-side 5673 port). Bus is SOFT-on-CRUD here (MSG-WEBAPI-04,
      # MinimalFailureStatus=Degraded) — broker-down never flips /health/ready to 503.
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: guest
      RabbitMq__Password: guest
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Phase 19 D-09 (INFRA-RMQ-02) — Start/Stop path hard-dep on a healthy broker.
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
